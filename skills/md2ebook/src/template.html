# 책 리더 데모 — 지원 요소 한 바퀴

> 이 문서는 `build.py` 가 다루는 마크다운 요소를 **하나도 빠짐없이** 펼쳐 보이는 데모다. H2 가 나올 때마다 새 챕터로 끊기는지도 함께 살핀다.

## 1. 헤딩과 텍스트 서식

이 줄 위의 두 제목이 각각 H1 과 H2 다. 그 아래가 H3 이다.

### 작은 제목 (H3)

한 문장 안에서 **굵게**와 *기울임*, 그리고 인라인 `코드` 가 모두 살아 있는지 본다. 셋이 나란히 놓여도 무너지지 않아야 한다.

링크도 확인한다. [외부 링크](https://example.com) 는 새 탭에서 열리고, [옆 문서](README.md) 처럼 `.md` 를 가리키는 링크는 같은 이름 `.html` 이 있으면 그쪽으로 연결된다.

## 2. 근거 라벨 칩

네 종류의 근거 라벨이 빠짐없이 고정 색칩으로 떠야 한다.

- `[사실]` 검증된 내용
- `[추정]` 근거는 있으나 단정하기 이른 것
- `[의견]` 주관적인 판단
- `[모름]` 아직 확인하지 못한 것

자주 쓰는 라벨도 고정 색을 갖는다.

- `[중요]` `[TODO]` `[질문]` `[참고]` `[경고]` `[팁]`

그 밖의 단어는 무엇이든 라벨이 되며, 색은 단어마다 자동으로 정해진다. 같은 단어는 어느 문서에서나 같은 색이다.

- `[배포]` `[보류]` `[리뷰]` `[아이디어]`

## 3. 목록과 인용

- 첫째 항목
- 둘째 항목
- 셋째 항목

> 인용문 또한 제 들여쓰기를 갖춘 채 렌더되는지 확인한다.

## 4. 표

| 요소 | 지원 | 비고 |
|---|---|---|
| 헤딩 | 예 | H1~H3 가 챕터로 |
| 표 | 예 | 바로 이 표 |
| 라벨 칩 | 예 | 위 2번 챕터 |

## 5. 코드펜스와 구분선

```
python build.py test.md test.html
```

위가 코드펜스, 아래가 구분선(`---`) 이다.
