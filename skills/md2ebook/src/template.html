<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>책 리더</title>
<style>
/*__STYLES__*/
</style>
</head>
<body>

<script type="text/markdown" id="book-md">
</script>

<!-- ============================ 리더 UI ============================ -->
<div class="reader" id="reader">
  <header class="chrome topbar">
    <button class="btn" id="btnToc" aria-label="목차">
      <svg viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="14" y2="18"/></svg>
      <span>목차</span>
    </button>
    <div class="doc-title" id="docTitle">책</div>
    <button class="btn aa" id="btnSettings" aria-label="설정">Aa</button>
  </header>

  <main class="stage" id="stage">
    <div class="layer below"><div class="page"><div class="page-pad" id="padBelow"></div><div class="page-shade"></div></div></div>
    <div class="layer anim" id="animLayer"><div class="page"><div class="page-pad" id="padAnim"></div><div class="page-shade" id="animShade"></div></div></div>
    <div class="tap-zones" id="tapZones">
      <div class="z prev" data-nav="prev"></div>
      <div class="z mid" data-nav="mid"></div>
      <div class="z next" data-nav="next"></div>
    </div>
  </main>

  <footer class="chrome botbar">
    <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
    <div class="prog-meta"><span class="chap" id="metaChap"></span><span id="metaPage">0 / 0</span></div>
  </footer>
</div>

<!-- 측정용 숨은 페이지 (실제 무대와 동일 크기여야 정확히 분할됨) -->
<div class="layer below" id="measureLayer" style="visibility:hidden;z-index:-1;pointer-events:none;"><div class="page"><div class="page-pad" id="padMeasure"></div></div></div>

<!-- 오버레이 -->
<div class="scrim" id="scrim"></div>

<aside class="sheet toc" id="tocSheet" aria-hidden="true">
  <div class="sheet-head"><h2>목차</h2>
    <button class="btn" id="tocClose" aria-label="닫기"><svg viewBox="0 0 24 24"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button>
  </div>
  <nav class="toc-list" id="tocList"></nav>
</aside>

<aside class="sheet settings" id="setSheet" aria-hidden="true">
  <div class="sheet-head"><h2>읽기 설정</h2>
    <button class="btn" id="setClose" aria-label="닫기"><svg viewBox="0 0 24 24"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button>
  </div>
  <div class="settings-body">
    <div class="set-row">
      <div class="set-label">테마</div>
      <div class="swatches" id="setTheme">
        <div class="swatch sw-paper" data-theme="paper">가</div>
        <div class="swatch sw-sepia" data-theme="sepia">가</div>
        <div class="swatch sw-gray" data-theme="gray">가</div>
        <div class="swatch sw-black" data-theme="black">가</div>
      </div>
    </div>
    <div class="set-row">
      <div class="set-label">페이지 넘김</div>
      <div class="seg" id="setFlip">
        <button data-flip="flip3d">3D 넘김</button>
        <button data-flip="slide">슬라이드</button>
        <button data-flip="fade">페이드</button>
        <button data-flip="scroll">스크롤</button>
      </div>
    </div>
    <div class="set-row">
      <div class="set-label">글자 크기</div>
      <div class="stepper"><button id="sizeDown">−</button><div class="val" id="sizeVal">18px</div><button id="sizeUp">+</button></div>
    </div>
    <div class="set-row">
      <div class="set-label">줄 간격</div>
      <div class="seg" id="setLead">
        <button data-lead="1.6">좁게</button>
        <button data-lead="1.9">보통</button>
        <button data-lead="2.2">넓게</button>
      </div>
    </div>
    <div class="set-row">
      <div class="set-label">글꼴</div>
      <div class="seg" id="setFont">
        <button data-font="sans">고딕</button>
        <button data-font="serif">명조</button>
      </div>
    </div>
    <div class="set-row" id="setLabelRow" hidden>
      <div class="set-label">라벨 색 <span class="acc-count" id="setLabelCount"></span></div>
      <div class="chip-grid" id="setLabels"></div>
      <div class="lab-editor" id="labelEditor" hidden>
        <span class="lbl auto" id="labEditChip" data-key=""></span>
        <input type="range" min="0" max="359" id="labEditRange" aria-label="라벨 색조" />
        <button class="lab-reset" id="labEditReset" title="자동 색으로">↺</button>
      </div>
    </div>
  </div>
</aside>

<div class="hint" id="hint">좌우를 탭하거나 밀어서 넘기세요 · 가운데 탭으로 메뉴</div>

<script>
//__APP__
</script>
</body>
</html>
