<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>CM6 Sandbox</title>
<style>
  /* 테마 토큰(--reader-font/--page/--ink/…)은 손복제하지 않는다.
     loadReaderStyles() 가 reader.html 의 :root·[data-theme] 블록을 통째로 주입하며,
     CM 은 그 주입 후에 마운트되므로 폰트·색이 보기(reader)와 단일 출처로 일치한다.
     과거 이 자리에 있던 `--reader-font:'Georgia'` 오버라이드가 주입 sans 를 흔들어
     sandbox 만 명조로 떠 보기와 어긋났다 — 제거함. */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #ddd; }

  /* ── 렌더 CSS 는 손복제하지 않는다. loadReaderStyles() 가 reader.html 의
     <style> 블록을 런타임에 그대로 주입한다(단일 출처 → drift 원천 차단).
     CM 은 reader 와 동일한 .page > .page-pad#padBelow 컨테이너에 마운트하므로
     .page-pad 스코프 스타일(line-height:1.9 포함)을 VS Code webview 와 픽셀 동일하게
     상속받는다. 아래는 sandbox 크롬(toolbar/log)과 페이지 프레임 배치 전용. ── */

  /* CM6 라이브에딧은 reader 의 "스크롤 모드"(.reader.scrollmode)에서만 마운트된다.
     그 모드에서 reader.html 은:
       .stage      { overflow-y:auto }           ← 실제 스크롤 컨테이너
       .page       { height:auto; min-height:100%; box-shadow:none }
       .page-pad   { position:relative; inset:auto; overflow:visible; min-height:100vh }
     sandbox 도 이 계층을 그대로 재현해야 한다. 이전엔 .page-pad 가 paged 모드 스타일
     (position:absolute; overflow:hidden; 고정 720px)로 남아 있어 뷰포트 밖 콘텐츠가
     통째로 클리핑됐다(리스트 뒷부분·wrap 버그 재현 불가 — sandbox 결함). */
  #stage {
    max-width: 760px;
    margin: 40px auto 150px;
    height: 720px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  #stage .page {
    position: relative;
    width: 100%;
    height: auto;
    min-height: 100%;
    background: var(--page);
    box-shadow: 0 4px 24px rgba(0,0,0,.15);
    border-radius: 4px;
  }
  /* reader.scrollmode .page-pad 오버라이드 — reader-styles 주입 전에도 최소한의
     스크롤 형태를 보장(주입 후엔 reader 규칙이 동일 값으로 다시 적용됨). */
  #stage .page-pad {
    position: relative;
    inset: auto;
    overflow: visible;
    min-height: 100vh;
  }

  #log {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #1e1e1e;
    color: #d4d4d4;
    font: 12px/1.5 monospace;
    padding: 8px 12px;
    height: 140px;
    overflow-y: auto;
    border-top: 2px solid #444;
  }
  #log .info  { color: #9cdcfe; }
  #log .warn  { color: #dcdcaa; }
  #log .error { color: #f48771; }
  #log .event { color: #4ec9b0; }

  #toolbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    background: #2d2d2d;
    color: #ccc;
    font: 13px/36px monospace;
    padding: 0 12px;
    display: flex;
    gap: 12px;
    align-items: center;
  }
  #toolbar button {
    background: #555; color: #eee; border: none;
    padding: 4px 10px; cursor: pointer; border-radius: 3px;
    font-size: 12px;
  }
  #toolbar button:hover { background: #777; }
  #status { margin-left: auto; color: #4ec9b0; }
</style>
</head>
<body>

<div id="toolbar">
  <span>CM6 Sandbox</span>
  <button onclick="reloadEditor()">↺ Reload</button>
  <button onclick="clearLog()">Clear Log</button>
  <button onclick="logDecos()">Log Decos</button>
  <span id="status">loading...</span>
</div>

<!-- reader.html 과 동일 컨테이너 구조: .page > .page-pad#padBelow.
     CM 은 #padBelow(=.page-pad) 에 마운트되어 .page-pad 스코프 CSS 를 상속. -->
<div id="stage">
  <div class="page">
    <div class="page-pad" id="padBelow"></div>
  </div>
</div>

<div id="log"></div>

<script>
/* ── 로그 패널 ── */
const logEl = document.getElementById('log');
function log(msg, cls = 'info') {
  const d = document.createElement('div');
  d.className = cls;
  d.textContent = '[' + new Date().toISOString().slice(11,23) + '] ' + msg;
  logEl.appendChild(d);
  logEl.scrollTop = logEl.scrollHeight;
}
function clearLog() { logEl.innerHTML = ''; }

/* 원본 console 가로채기 */
const _log   = console.log.bind(console);
const _warn  = console.warn.bind(console);
const _error = console.error.bind(console);
console.log   = (...a) => { _log(...a);   log(a.join(' '), 'info');  };
console.warn  = (...a) => { _warn(...a);  log(a.join(' '), 'warn');  };
console.error = (...a) => { _error(...a); log(a.join(' '), 'error'); };

/* ── 마크다운 파서 — reader.html 의 parseMarkdown 그대로 이식 ── */
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
const LABELS = { '사실':'fact','추정':'guess','의견':'op','모름':'none' };
const HUES = {
  '중요':6,'IMPORTANT':6,'TODO':214,'할일':214,'질문':278,'QUESTION':278,
  '참고':158,'NOTE':158,'REF':158,'경고':32,'WARNING':32,'팁':176,'TIP':176,
};
function hue(s){ if(HUES[s]!=null)return HUES[s]; let h=0; for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))>>>0; return h%360; }
const usedLabels = new Set();
let taskIdx = 0;
function attr(s){ return esc(s).replace(/"/g,'&quot;'); }
const NUL = String.fromCharCode(0);
const PH = n => NUL + n + NUL;
const RE_PH = new RegExp(NUL+'(\\d+)'+NUL,'g');
const RE_CODE = /(`+)((?:(?!\1)[\s\S])+?)\1/g;
const RE_LABEL = /^\[(.+)\]$/;
const RE_IMG = /!\[([^\]]*)\]\(([^)\s]+)(?:\s+"([^"]*)")?\)/g;
const RE_BOLD = /\*\*([^*]+)\*\*/g;
const RE_ITAL = /(^|[^*])\*([^*\n]+)\*/g;
const RE_DEL = /~~([^~]+)~~/g;
const RE_LINK = /(^|[^!])\[([^\]]+)\]\(([^)\s]+)(?:\s+"([^"]*)")?\)/g;
const RE_EXT = /^(https?:|mailto:|\/\/)/i;
function renderLabel(key,raw){ if(LABELS[key])return '<span class="lbl '+LABELS[key]+'">'+esc(raw)+'</span>'; usedLabels.add(key); return '<span class="lbl auto" data-key="'+attr(key)+'">'+esc(raw)+'</span>'; }
function inline(text){
  const codes=[];
  text=text.replace(RE_CODE,(m,ticks,c)=>{ let body=c; if(body.length>=2&&body.charCodeAt(0)===32&&body.charCodeAt(body.length-1)===32&&body.trim()!=='')body=body.slice(1,-1); const t=body.trim(); const lm=RE_LABEL.exec(t); const h=lm?renderLabel(lm[1],t):'<code>'+esc(body)+'</code>'; codes.push(h); return PH(codes.length-1); });
  text=text.replace(RE_IMG,(m,alt,src,title)=>{ const tt=title?' title="'+attr(title)+'"':''; codes.push('<img src="'+src+'" alt="'+attr(alt)+'"'+tt+'>'); return PH(codes.length-1); });
  text=text.replace(/<svg[\s\S]*?<\/svg>/gi,(m)=>{ codes.push(m); return PH(codes.length-1); });
  text=esc(text);
  text=text.replace(/&lt;br\s*\/?&gt;/gi,'<br>');
  text=text.replace(RE_BOLD,'<strong>$1</strong>');
  text=text.replace(RE_ITAL,'$1<em>$2</em>');
  text=text.replace(RE_DEL,'<del>$1</del>');
  text=text.replace(RE_LINK,(m,pre,txt,href,title)=>{ const ext=RE_EXT.test(href); const tgt=ext?' target="_blank" rel="noopener noreferrer"':''; const tt=title?' title="'+attr(title)+'"':''; return pre+'<a href="'+href.replace(/"/g,'&quot;')+'"'+tgt+tt+'>'+txt+'</a>'; });
  text=text.replace(RE_PH,(m,i)=>codes[+i]);
  return text;
}
function slug(s){ return s.toLowerCase().replace(/<[^>]+>/g,'').replace(/[^\w가-힣\s-]/g,'').trim().replace(/\s+/g,'-').slice(0,60)||'h'; }
function renderList(items){
  let out=''; const stack=[];
  const closeTo=n=>{ while(stack.length>n){ const t=stack.pop(); out+='</li>'+(t.ordered?'</ol>':'</ul>'); } };
  items.forEach((it,idx)=>{
    if(it.para!=null){ while(stack.length&&it.indent<stack[stack.length-1].indent)closeTo(stack.length-1); out+='<p>'+inline(it.para)+'</p>'; return; }
    while(stack.length&&it.indent<stack[stack.length-1].indent)closeTo(stack.length-1);
    const top=stack[stack.length-1];
    if(top&&it.indent<=top.indent){ out+='</li>'; }
    else{ stack.push({indent:it.indent,ordered:it.ordered}); out+=it.ordered?'<ol>':'<ul>'; }
    const cb=/^\[([ xX])\]\s+([\s\S]*)$/.exec(it.text);
    if(cb){ const ck=cb[1].toLowerCase()==='x'?' checked':''; out+='<li class="task"><input type="checkbox" data-task-idx="'+(taskIdx++)+'"'+ck+'> '+inline(cb[2]); }
    else{ const nx=items[idx+1]; out+=(nx&&nx.para!=null&&nx.indent===it.indent)?'<li><p>'+inline(it.text)+'</p>':'<li>'+inline(it.text); }
  });
  closeTo(0); return out;
}
function parseMarkdown(md){
  const lines=md.replace(/\r/g,'').split('\n');
  let html='',i=0; const usedIds={};
  taskIdx=0;
  const mkId=base=>{ let id=base,n=2; while(usedIds[id]){id=base+'-'+n++;} usedIds[id]=1; return id; };
  while(i<lines.length){
    let line=lines[i];
    if(/^```/.test(line)){ const lang=(/^`{3,}\s*([\w-]*)/.exec(line)||[])[1]||''; let buf=[]; i++; while(i<lines.length&&!/^```/.test(lines[i])){ buf.push(lines[i]); i++; } i++; const src=buf.join('\n'); if(/^mermaid$/i.test(lang)){ html+='<div class="mermaid" data-src="'+attr(src)+'">'+esc(src)+'</div>'; continue; } html+='<pre><code>'+esc(src)+'</code></pre>'; continue; }
    let h=/^(#{1,6})\s+(.*)$/.exec(line);
    if(h){ const lv=h[1].length,txt=inline(h[2].trim()); const id=mkId(slug(h[2])); html+='<h'+lv+' id="'+id+'" data-h="'+lv+'">'+txt+'</h'+lv+'>'; i++; continue; }
    if(/^---+\s*$/.test(line)){ html+='<hr/>'; i++; continue; }
    if(/^>\s?/.test(line)){ let buf=[]; while(i<lines.length&&/^>\s?/.test(lines[i])){ buf.push(lines[i].replace(/^>\s?/,'')); i++; } const groups=[]; let cur=[]; buf.forEach(b=>{ if(b.trim()===''){if(cur.length){groups.push(cur);cur=[];}}else cur.push(b); }); if(cur.length)groups.push(cur); html+='<blockquote>'+groups.map(g=>'<p>'+inline(g.join('<br>'))+'</p>').join('')+'</blockquote>'; continue; }
    if(/^\|.*\|/.test(line)&&i+1<lines.length&&/^\|?[\s:|-]+\|?\s*$/.test(lines[i+1])&&lines[i+1].includes('-')){ const splitRow=r=>r.replace(/^\||\|$/g,'').split('|').map(c=>c.trim()); const head=splitRow(line); i+=2; let body=''; while(i<lines.length&&/^\|.*\|/.test(lines[i])){ const cells=splitRow(lines[i]); body+='<tr>'+cells.map(c=>'<td>'+inline(c)+'</td>').join('')+'</tr>'; i++; } html+='<div class="table-wrap"><table><thead><tr>'+head.map(c=>'<th>'+inline(c)+'</th>').join('')+'</tr></thead><tbody>'+body+'</tbody></table></div>'; continue; }
    const liRe=/^(\s*)([-*]|\d+\.)\s+(.*)$/;
    if(liRe.test(line)){ const items=[]; while(i<lines.length){ const m=liRe.exec(lines[i]); if(m){ items.push({indent:m[1].replace(/\t/g,'    ').length,ordered:/\d/.test(m[2]),text:m[3]}); i++; continue; } if(/^\s*$/.test(lines[i])){ let j=i; while(j<lines.length&&/^\s*$/.test(lines[j]))j++; if(j>=lines.length||!items.length)break; if(liRe.test(lines[j])){ const nm=liRe.exec(lines[j]); const nInd=nm[1].replace(/\t/g,'    ').length,nOrd=/\d/.test(nm[2]),root=items[0]; if(nInd>root.indent||(nInd===root.indent&&nOrd===root.ordered)){i=j;continue;} break; } const ni=(lines[j].match(/^(\s*)/)[1]).replace(/\t/g,'    ').length; if(ni>items[0].indent){ i=j; const buf=[]; while(i<lines.length&&!/^\s*$/.test(lines[i])&&!liRe.test(lines[i])){ buf.push(lines[i].trim()); i++; } let owner=items[0]; for(let k=items.length-1;k>=0;k--){if(items[k].para==null&&items[k].indent<ni){owner=items[k];break;}} items.push({para:buf.join('<br>'),indent:owner.indent}); continue; } } else{ const ci=(lines[i].match(/^(\s*)/)[1]).replace(/\t/g,'    ').length; if(items.length&&ci>items[0].indent){ const buf=[]; while(i<lines.length&&!/^\s*$/.test(lines[i])&&!liRe.test(lines[i])){ buf.push(lines[i].trim()); i++; } const last=items[items.length-1]; if(last.para!=null)last.para+='<br>'+buf.join('<br>'); else last.text+='<br>'+buf.join('<br>'); continue; } } break; } html+=renderList(items); continue; }
    if(/^\s*<svg[\s>]/i.test(line)){ let buf=[]; while(i<lines.length){ buf.push(lines[i]); const end=/<\/svg>/i.test(lines[i]); i++; if(end)break; } html+=buf.join('\n'); continue; }
    if(/^\s*$/.test(line)){ i++; continue; }
    let buf=[];
    while(i<lines.length&&!/^\s*$/.test(lines[i])&&!/^(#{1,6}\s|>|```|\||\s*[-*]\s|\s*\d+\.\s|---)/.test(lines[i])){ buf.push(lines[i]); i++; }
    if(buf.length)html+='<p>'+inline(buf.join('<br>'))+'</p>';
    else{ html+='<p>'+inline(line)+'</p>'; i++; }
  }
  return html;
}

const SAMPLE = `# CM6 샌드박스 테스트

비커서 블록은 HTML 렌더, 커서 블록은 raw 마크다운으로 표시됩니다.

## 인라인 데코레이션 (Paragraph / Heading)

**굵은 글씨**와 _기울임_을 함께 쓸 수 있고 \`인라인 코드\`도 지원합니다.

라벨 테스트: \`[사실]\` 과 \`[추정]\` 과 임의 \`[중요]\` 그리고 코드 \`console.log()\` 함께.

## 아주 긴 제목이라 한 줄에 안 들어가고 반드시 줄바꿈이 일어나는 이슈A 진단용 헤딩 문장

이것은 **매우 긴 굵은 글씨 문단**으로서 한 줄에 담기지 않아 줄바꿈이 일어나며, 커서 진입 시 별표 마커가 나타나 폭이 변하는지 확인하기 위한 이슈A 진단용 테스트 문장이며 계속 이어진다.

긴 라벨 문단: 이 문단은 충분히 길어서 줄바꿈이 일어나고 중간에 \`[중요]\` 라벨과 \`[사실]\` 라벨과 \`인라인코드\` 가 섞여 있어, 커서 진입 시 백틱이 노출되며 wrap 시각행 수가 바뀌는지 측정하기 위한 이슈A 진단용 문장이다.

/* ── reader.html 의 <style> 을 런타임에 그대로 주입 (단일 출처) ──
   손복제 대신 실제 reader CSS 를 가져와 .page-pad 스코프를 VS Code webview 와
   픽셀 동일하게 만든다. :root 테마 토큰·.page-pad·.lbl 까지 전부 포함된다. */
async function loadReaderStyles() {
  if (document.getElementById('reader-styles')) return;
  const res = await fetch('../reader.html');
  if (!res.ok) throw new Error('reader.html 로드 실패: ' + res.status);
  const html = await res.text();
  const m = html.match(/<style>([\s\S]*?)<\/style>/i);
  if (!m) throw new Error('reader.html 에서 <style> 블록을 못 찾음');
  const styleEl = document.createElement('style');
  styleEl.id = 'reader-styles';
  styleEl.textContent = m[1];
  // 기존 sandbox 크롬 스타일보다 뒤에 와서 .page-pad 규칙이 확실히 적용되도록 head 끝에
  document.head.appendChild(styleEl);
  // paper 테마 기본 적용(reader 와 동일 토큰)
  document.documentElement.setAttribute('data-theme', 'paper');
  log('reader.html <style> 주입 완료 (' + m[1].length + ' bytes)', 'event');
}

/* ── 라벨 커스텀 색 스타일 (reader.html applyLabelStyle 이식) ──
   보기(reader)는 auto 라벨 색을 `.lbl.auto[data-key="k"]{--h:hue}` 규칙으로 입히고,
   사용자가 조정한 per-key 색은 settings.labelHues[k] 로 저장한다. 편집 줄 라벨 데코도
   같은 data-key 를 달므로, 이 #labelStyle 규칙만 있으면 커스텀 색이 그대로 반영된다.
   sandbox 는 VS Code(reader)가 하는 이 역할을 대신해 신뢰 루프를 맞춘다.
   labelHues 는 테스트용 커스텀 색 시뮬레이션(예: '중요'를 기본 hue(6) 아닌 200 으로). */
const labelHues = { '중요': 200 };   // 커스텀 반영 검증용 — 기본 hue(6=빨강)와 확연히 다른 파랑
function sandboxLabelHue(k){ return labelHues[k] != null ? labelHues[k] : hue(k); }
function applyLabelStyle(){
  let css = '';
  usedLabels.forEach(k => {
    const sel = '.lbl.auto[data-key="' + k.replace(/["\\]/g,'\\$&') + '"]';
    css += sel + '{--h:' + sandboxLabelHue(k) + '}';
  });
  let el = document.getElementById('labelStyle');
  if (!el){ el = document.createElement('style'); el.id = 'labelStyle'; document.head.appendChild(el); }
  el.textContent = css;
}

/* ── CM6 에디터 ── */
let editor = null;

function mountInPad() {
  const container = document.getElementById('padBelow');
  container.innerHTML = '';
  const ed = window.MD2EBOOK_CM6.mount(container, {
    initialDoc: SAMPLE,
    parseBlock: md => parseMarkdown(md),
    onChange: md => log('onChange: ' + md.slice(0, 60).replace(/\n/g,'↵') + '…', 'info'),
  });
  container.addEventListener('focusin',  () => log('focusin',  'event'));
  container.addEventListener('focusout', () => log('focusout', 'event'));
  return ed;
}

async function loadEditor() {
  document.getElementById('status').textContent = 'loading styles...';
  await loadReaderStyles();

  document.getElementById('status').textContent = 'loading cm6...';
  // cm6-bundle.js 로드 (같은 디렉터리 기준 상대 경로)
  await new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = '../cm6-bundle.js?cb=' + Date.now(); // 캐시버스터(테스트 전용) — 항상 최신 번들
    s.onload = resolve;
    s.onerror = () => reject(new Error('cm6-bundle.js 로드 실패'));
    document.head.appendChild(s);
  });

  if (!window.MD2EBOOK_CM6) {
    log('MD2EBOOK_CM6 없음 — 번들 확인 필요', 'error');
    document.getElementById('status').textContent = 'ERROR';
    return;
  }

  // usedLabels 를 확실히 채운다 — SAMPLE 전체를 한 번 파싱(CM 의 뷰포트 부분 파싱에
  // 의존하지 않게). 그 뒤 라벨 커스텀 색 규칙 생성.
  parseMarkdown(SAMPLE);
  applyLabelStyle();

  editor = mountInPad();
  window._editor = editor; // Playwright 테스트용 전역 노출

  document.getElementById('status').textContent = 'ready';
  log('CM6 mount 완료 (.page-pad 컨테이너)', 'event');
}

function reloadEditor() {
  if (editor) { editor.destroy(); editor = null; }
  document.getElementById('padBelow').innerHTML = '';
  log('editor 재시작', 'warn');
  // 이미 로드된 번들 재사용
  if (window.MD2EBOOK_CM6) {
    editor = mountInPad();
    window._editor = editor;
    document.getElementById('status').textContent = 'ready';
    log('CM6 재mount 완료 (.page-pad 컨테이너)', 'event');
  }
}

function logDecos() {
  const decoEl = document.querySelectorAll('[class*="cm-md-"]');
  log('cm-md-* 엘리먼트 수: ' + decoEl.length, 'info');
  const counts = {};
  decoEl.forEach(el => {
    [...el.classList].filter(c => c.startsWith('cm-md-')).forEach(c => {
      counts[c] = (counts[c] || 0) + 1;
    });
  });
  Object.entries(counts).forEach(([k, v]) => log(`  ${k}: ${v}`, 'info'));
}

window.onerror = (msg, src, line, col, err) => {
  log(`ERROR: ${msg} (${src}:${line}:${col})`, 'error');
};

loadEditor();
</script>
</body>
</html>
