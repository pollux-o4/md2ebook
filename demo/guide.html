<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>책 리더</title>
<style>
/* =========================================================================
   책 리더 — 단일 파일 마크다운 e-book 템플릿
   테마 토큰. data-theme 으로 전환. (paper / sepia / gray / black)
   ========================================================================= */
:root{
  --font-sans: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", "Malgun Gothic", system-ui, sans-serif;
  --font-serif: Georgia, "Times New Roman", "Noto Serif KR", "AppleMyungjo", "Batang", serif;
  --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "D2Coding", monospace;

  /* 사용자 조정 (설정에서 덮어씀) */
  --reader-font: var(--font-sans);
  --reader-size: 18px;
  --reader-leading: 1.9;

  /* 근거 라벨 칩 */
  --chip-fact: #2f7d55;   --chip-fact-bg: rgba(47,125,85,.12);
  --chip-guess:#9a6b15;   --chip-guess-bg:rgba(154,107,21,.13);
  --chip-op:   #2563a8;   --chip-op-bg:  rgba(37,99,168,.12);
  --chip-none: #777;      --chip-none-bg:rgba(120,120,120,.13);

  --dur: .22s;
}

/* ---- paper (기본) ---- */
:root[data-theme="paper"]{
  --bg:#e7e0d2; --page:#faf6ec; --ink:#2c2823; --ink-soft:#6a6357;
  --rule:#e3dccd; --chrome:#f4efe4; --chrome-ink:#5a5346; --chrome-rule:#ddd5c4;
  --accent:#9c6b3f; --code-bg:#efe8d8; --quote-rule:#cdbf9f; --sel:rgba(156,107,63,.22);
  --page-edge:rgba(120,100,70,.18); --overlay:rgba(60,52,40,.45);
}
/* ---- sepia ---- */
:root[data-theme="sepia"]{
  --bg:#d9c7a3; --page:#ecdcbd; --ink:#43381f; --ink-soft:#7c6a48;
  --rule:#dbcaa6; --chrome:#e4d3ad; --chrome-ink:#6a5a38; --chrome-rule:#cdb98e;
  --accent:#9a5b2c; --code-bg:#e2cfa6; --quote-rule:#c4a877; --sel:rgba(154,91,44,.25);
  --page-edge:rgba(120,90,40,.22); --overlay:rgba(70,55,25,.45);
}
/* ---- gray (warm night) ---- */
:root[data-theme="gray"]{
  --bg:#1c1c20; --page:#26262b; --ink:#c9c6c0; --ink-soft:#8a877f;
  --rule:#33333a; --chrome:#212126; --chrome-ink:#9a978f; --chrome-rule:#34343b;
  --accent:#c79b6e; --code-bg:#2e2e34; --quote-rule:#45454d; --sel:rgba(199,155,110,.25);
  --page-edge:rgba(0,0,0,.4); --overlay:rgba(0,0,0,.6);
  --chip-fact:#6cc295; --chip-fact-bg:rgba(108,194,149,.14);
  --chip-guess:#d6ac5e; --chip-guess-bg:rgba(214,172,94,.14);
  --chip-op:#6fa8df; --chip-op-bg:rgba(111,168,223,.14);
  --chip-none:#9a978f; --chip-none-bg:rgba(154,151,143,.16);
}
/* ---- black (OLED) ---- */
:root[data-theme="black"]{
  --bg:#000; --page:#0c0c0d; --ink:#b6b4af; --ink-soft:#76746e;
  --rule:#1f1f22; --chrome:#0a0a0b; --chrome-ink:#86847e; --chrome-rule:#1c1c1f;
  --accent:#b8895d; --code-bg:#161617; --quote-rule:#2a2a2d; --sel:rgba(184,137,93,.28);
  --page-edge:rgba(0,0,0,.6); --overlay:rgba(0,0,0,.7);
  --chip-fact:#5fb98a; --chip-fact-bg:rgba(95,185,138,.14);
  --chip-guess:#cfa455; --chip-guess-bg:rgba(207,164,85,.14);
  --chip-op:#6aa2d8; --chip-op-bg:rgba(106,162,216,.14);
  --chip-none:#86847e; --chip-none-bg:rgba(134,132,126,.16);
}

*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ margin:0; height:100%; overflow:hidden; background:var(--bg); }
body{ font-family:var(--reader-font); color:var(--ink); }
::selection{ background:var(--sel); }

/* ============================ 리더 셸 ============================ */
.reader{ position:fixed; inset:0; display:flex; flex-direction:column; background:var(--bg); }
/* 가로 스와이프로 넘기는 동안에만 선택 억제 (평소엔 본문 복사 가능) */
.reader.dragging, .reader.dragging *{ -webkit-user-select:none; user-select:none; -webkit-touch-callout:none; }

/* 상·하단 크롬 */
.chrome{ position:absolute; left:0; right:0; z-index:40; background:var(--chrome);
  color:var(--chrome-ink); transition:transform var(--dur) ease, opacity var(--dur) ease;
  display:flex; align-items:center; padding:0 max(14px, env(safe-area-inset-left)); }
.topbar{ top:0; height:54px; border-bottom:1px solid var(--chrome-rule);
  padding-top:env(safe-area-inset-top); height:calc(54px + env(safe-area-inset-top)); }
.botbar{ bottom:0; height:50px; border-top:1px solid var(--chrome-rule); flex-direction:column;
  padding-bottom:env(safe-area-inset-bottom); height:calc(50px + env(safe-area-inset-bottom));
  justify-content:center; gap:6px; }
.reader.immersive .topbar{ transform:translateY(-110%); opacity:0; }
.reader.immersive .botbar{ transform:translateY(110%); opacity:0; }

.btn{ appearance:none; border:0; background:transparent; color:var(--chrome-ink);
  font:inherit; cursor:pointer; padding:8px; display:inline-flex; align-items:center;
  gap:7px; border-radius:8px; font-size:14px; line-height:1; }
.btn:hover{ background:color-mix(in srgb, var(--chrome-ink) 10%, transparent); }
.btn:active{ opacity:.6; }
.btn svg{ width:19px; height:19px; stroke:currentColor; fill:none; stroke-width:1.6;
  stroke-linecap:round; stroke-linejoin:round; }
.topbar .doc-title{ flex:1; text-align:center; font-size:14.5px; font-weight:600;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding:0 8px; color:var(--chrome-ink); }
.topbar .btn.aa{ font-size:17px; font-weight:600; }

/* 진행 */
.prog-track{ width:min(620px, 78%); height:3px; border-radius:2px;
  background:color-mix(in srgb, var(--chrome-ink) 18%, transparent); overflow:hidden; }
.prog-fill{ height:100%; width:0; background:var(--accent); border-radius:2px;
  transition:width var(--dur) ease; }
/* 스크롤 모드: 진행바를 스크롤에 1:1 밀착(트랜지션 지연 제거 → 빠릿) */
.scrollmode .prog-fill{ transition:none; }
.prog-meta{ display:flex; justify-content:space-between; width:min(620px, 78%);
  font-size:11.5px; color:var(--chrome-ink); font-variant-numeric:tabular-nums; }
.prog-meta .chap{ max-width:62%; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; opacity:.85; }

/* ============================ 무대 / 페이지 ============================ */
.stage{ position:absolute; inset:0; perspective:2400px; perspective-origin:50% 50%;
  overflow:hidden; touch-action:pan-y; }
.layer{ position:absolute; inset:0; display:flex; justify-content:center;
  will-change:transform, opacity; }
.layer.below{ z-index:1; }
.layer.anim{ z-index:2; display:none; }
.layer.anim.flipping{ transform-origin:left center; }

.page{ position:relative; width:100%; max-width:760px; height:100%;
  background:var(--page); color:var(--ink); overflow:hidden;
  box-shadow:0 0 0 1px var(--page-edge); }
.layer.anim .page{ box-shadow:-14px 0 36px -10px var(--page-edge); }
.page-pad{ position:absolute; inset:0; overflow:hidden;
  padding:clamp(28px,5.2vw,64px) clamp(22px,5vw,58px);
  padding-top:calc(54px + env(safe-area-inset-top) + clamp(8px,2vw,20px));
  padding-bottom:calc(50px + env(safe-area-inset-bottom) + clamp(6px,1.5vw,16px)); }

/* 페이지 위 음영(3D 넘김 시 페이지가 모서리로 설 때 어두워짐) */
.page-shade{ position:absolute; inset:0; pointer-events:none; opacity:0;
  background:linear-gradient(90deg, rgba(0,0,0,0) 55%, rgba(0,0,0,.04) 78%, rgba(0,0,0,.45) 100%); }

/* 클릭 영역 */
.tap-zones{ position:absolute; inset:0; z-index:30; display:flex; pointer-events:none; }
.tap-zones .z{ flex:1; }
.tap-zones .z.prev{ flex:0 0 26%; cursor:w-resize; }
.tap-zones .z.next{ flex:0 0 26%; cursor:e-resize; }

/* ============================ 읽기 타이포 ============================ */
.page-pad{ font-size:var(--reader-size); line-height:var(--reader-leading);
  letter-spacing:0; word-break:keep-all; overflow-wrap:break-word; text-wrap:pretty; }
.page-pad > :first-child{ margin-top:0; }
.page-pad > :last-child{ margin-bottom:0; }
.page-pad h1{ font-size:1.62em; line-height:1.3; font-weight:600; margin:0 0 .5em;
  letter-spacing:-.01em; }
.page-pad h2{ font-size:1.3em; line-height:1.35; font-weight:600; margin:1.5em 0 .55em;
  padding-bottom:.32em; border-bottom:1px solid var(--rule); }
.page-pad h3{ font-size:1.08em; font-weight:600; margin:1.5em 0 .4em; color:var(--ink); }
.page-pad h4{ font-size:1em; font-weight:600; margin:1.3em 0 .35em; color:var(--ink); }
.page-pad h5{ font-size:.92em; font-weight:600; margin:1.2em 0 .3em; color:var(--ink-soft);
  letter-spacing:.01em; }
.page-pad h6{ font-size:.85em; font-weight:600; margin:1.2em 0 .3em; color:var(--ink-soft);
  letter-spacing:.04em; text-transform:uppercase; }
.page-pad p{ margin:0 0 1.05em; }
.page-pad strong{ font-weight:600; }
.page-pad del{ color:var(--ink-soft); text-decoration-thickness:1px; }
.page-pad img{ max-width:100%; max-height:80vh; height:auto; display:block;
  margin:1.1em auto; border-radius:6px; cursor:zoom-in; }
.page-pad li.task{ list-style:none; margin-left:-1.1em; }
.page-pad li.task input{ margin-right:.5em; vertical-align:middle; accent-color:var(--accent);
  cursor:pointer; }

/* 코드블록 + 복사 버튼 */
.page-pad .codeblock{ position:relative; margin:0 0 1.15em; }
.page-pad .codeblock pre{ margin:0; }
.page-pad .copy-btn{ position:absolute; top:8px; right:8px; z-index:2; appearance:none;
  border:1px solid var(--rule); background:var(--page); color:var(--ink-soft);
  font:inherit; font-size:11.5px; line-height:1; padding:5px 9px; border-radius:6px;
  cursor:pointer; opacity:.65; transition:opacity .15s ease; }
.page-pad .codeblock:hover .copy-btn{ opacity:1; }
.page-pad .copy-btn:hover{ color:var(--ink); border-color:var(--accent); }
.page-pad .copy-btn:active{ opacity:.5; }

/* 이미지 라이트박스 (탭하여 확대) */
.lightbox{ position:fixed; inset:0; z-index:70; display:none; align-items:center;
  justify-content:center; background:var(--overlay); cursor:zoom-out;
  padding:max(16px, env(safe-area-inset-top)) 16px; }
.lightbox.show{ display:flex; }
.lightbox img{ max-width:100%; max-height:100%; border-radius:6px; cursor:zoom-out;
  box-shadow:0 8px 40px rgba(0,0,0,.5); }
.page-pad a{ color:var(--accent); text-decoration:none; border-bottom:1px dotted var(--accent); }
.page-pad ul,.page-pad ol{ margin:0 0 1.05em; padding-left:1.35em; }
.page-pad li{ margin:.32em 0; }
.page-pad li::marker{ color:var(--ink-soft); }
.page-pad code{ font-family:var(--font-mono); font-size:.86em; background:var(--code-bg);
  padding:.08em .42em; border-radius:4px; white-space:nowrap; }
.page-pad pre{ background:var(--code-bg); border-radius:8px; padding:14px 16px;
  overflow-x:auto; margin:0 0 1.15em; line-height:1.55; }
.page-pad pre code{ background:none; padding:0; white-space:pre; font-size:.82em; }
.page-pad blockquote{ margin:0 0 1.15em; padding:.1em 0 .1em 1.05em;
  border-left:2px solid var(--quote-rule); color:var(--ink-soft); font-size:.96em; }
.page-pad blockquote p{ margin:.2em 0; }
.table-wrap{ overflow-x:auto; margin:0 0 1.2em; -webkit-overflow-scrolling:touch; }
.page-pad table{ border-collapse:collapse; width:100%; font-size:.9em; }
.page-pad th,.page-pad td{ border:1px solid var(--rule); padding:.5em .7em; text-align:left;
  vertical-align:top; word-break:keep-all; }
.page-pad th{ background:color-mix(in srgb, var(--ink) 5%, transparent); font-weight:600; }
.page-pad hr{ border:0; border-top:1px solid var(--rule); margin:1.6em 0; }

/* 근거 라벨 칩 */
.lbl{ font-family:var(--font-sans); font-size:.74em; font-weight:600; padding:.12em .5em;
  border-radius:4px; white-space:nowrap; letter-spacing:0; vertical-align:.04em; }
.lbl.fact{ color:var(--chip-fact); background:var(--chip-fact-bg); }
.lbl.guess{ color:var(--chip-guess); background:var(--chip-guess-bg); }
.lbl.op{ color:var(--chip-op); background:var(--chip-op-bg); }
.lbl.none{ color:var(--chip-none); background:var(--chip-none-bg); }
/* 예약어 외 라벨: 단어 해시로 hue(--h) 자동 배정, 테마별 명도 보정 */
.lbl.auto{ color:hsl(var(--h) 48% 34%); background:hsl(var(--h) 45% 46% / .14); }
:root[data-theme="gray"] .lbl.auto,
:root[data-theme="black"] .lbl.auto{ color:hsl(var(--h) 55% 72%); background:hsl(var(--h) 45% 60% / .16); }
/* 설정 패널 — 라벨 색: 칩 그리드 + 탭하면 그 칩만 인라인 편집 */
.acc-count{ font-weight:500; opacity:.55; text-transform:none; letter-spacing:0; font-size:11px; }
.chip-grid{ display:flex; flex-wrap:wrap; gap:8px; margin-top:3px; }
.chip-grid .lbl{ cursor:pointer; user-select:none; }
.chip-grid .lbl.sel{ box-shadow:0 0 0 2px var(--page), 0 0 0 4px currentColor; }
.lab-editor{ display:flex; align-items:center; gap:11px; margin-top:14px;
  padding-top:13px; border-top:1px dashed var(--chrome-rule); }
.lab-editor .lbl{ min-width:62px; text-align:center; flex:0 0 auto; }
.lab-editor input[type=range]{ flex:1; min-width:0; accent-color:var(--accent); }
.lab-reset{ appearance:none; border:0; background:transparent; color:var(--chrome-ink);
  cursor:pointer; font-size:16px; line-height:1; padding:5px 7px; border-radius:6px; flex:0 0 auto; }
.lab-reset:hover{ background:color-mix(in srgb, var(--chrome-ink) 12%, transparent); }

/* 스크롤 모드 */
.reader.scrollmode .stage{ overflow-y:auto; -webkit-overflow-scrolling:touch; perspective:none; }
.reader.scrollmode .tap-zones,
.reader.scrollmode .layer.anim,
.reader.scrollmode .page-shade{ display:none; }
.reader.scrollmode .layer.below{ position:relative; height:auto; min-height:100%; }
.reader.scrollmode .page{ height:auto; min-height:100%; box-shadow:none; }
.reader.scrollmode .page-pad{ position:relative; inset:auto; overflow:visible;
  min-height:100vh; }
.reader.scrollmode .page-pad + .page-pad{ border-top:1px solid var(--rule); }

/* ============================ 오버레이 (목차 / 설정) ============================ */
.scrim{ position:fixed; inset:0; z-index:60; background:var(--overlay); opacity:0;
  pointer-events:none; transition:opacity var(--dur) ease; }
.scrim.show{ opacity:1; pointer-events:auto; }

.sheet{ position:fixed; z-index:61; background:var(--chrome); color:var(--chrome-ink);
  transition:transform .26s cubic-bezier(.2,.7,.25,1); display:flex; flex-direction:column; }

/* 목차: 좌측 드로어 */
.toc{ top:0; left:0; bottom:0; width:min(380px, 86vw); transform:translateX(-104%);
  border-right:1px solid var(--chrome-rule); }
.toc.show{ transform:translateX(0); }
.sheet-head{ display:flex; align-items:center; justify-content:space-between;
  padding:env(safe-area-inset-top) 18px 0; height:calc(58px + env(safe-area-inset-top));
  border-bottom:1px solid var(--chrome-rule); flex:0 0 auto; }
.sheet-head h2{ margin:0; font-size:15px; font-weight:600; color:var(--chrome-ink); }
.toc-list{ overflow-y:auto; padding:8px 0 calc(20px + env(safe-area-inset-bottom)); flex:1; }
.toc-item{ display:flex; align-items:baseline; gap:10px; width:100%; text-align:left;
  background:none; border:0; color:var(--chrome-ink); font:inherit; cursor:pointer;
  padding:9px 18px; font-size:14px; line-height:1.45; }
.toc-item:hover{ background:color-mix(in srgb, var(--chrome-ink) 8%, transparent); }
.toc-item.lv1{ font-weight:600; }
.toc-item.lv2{ padding-left:18px; }
.toc-item.lv3{ padding-left:38px; font-size:13px; color:var(--ink-soft); }
.toc-item.active{ color:var(--accent); }
.toc-item.active::before{ content:""; position:absolute; left:0; width:3px; height:1.4em;
  background:var(--accent); border-radius:2px; }
.toc-item{ position:relative; }
.toc-item .pg{ margin-left:auto; font-size:11.5px; opacity:.6; font-variant-numeric:tabular-nums; }

/* 설정: 하단 시트 */
.settings{ left:0; right:0; bottom:0; transform:translateY(104%);
  border-top:1px solid var(--chrome-rule); border-radius:14px 14px 0 0;
  padding-bottom:env(safe-area-inset-bottom); max-height:86vh; }
.settings.show{ transform:translateY(0); }
.settings-body{ overflow-y:auto; padding:6px 20px 22px; }
.set-row{ padding:15px 0; border-bottom:1px solid var(--chrome-rule); }
.set-row:last-child{ border-bottom:0; }
.set-label{ font-size:12px; font-weight:600; letter-spacing:.02em; text-transform:uppercase;
  color:var(--ink-soft); margin-bottom:11px; }
.seg{ display:flex; gap:6px; flex-wrap:wrap; }
.seg button{ flex:1; min-width:max-content; appearance:none; border:1px solid var(--chrome-rule);
  background:transparent; color:var(--chrome-ink); font:inherit; font-size:13.5px;
  padding:9px 12px; border-radius:8px; cursor:pointer; transition:all .15s ease; }
.seg button:hover{ border-color:var(--accent); }
.seg button.on{ border-color:var(--accent); background:color-mix(in srgb,var(--accent) 14%,transparent);
  color:var(--accent); font-weight:600; }
.stepper{ display:flex; align-items:center; gap:14px; }
.stepper button{ width:42px; height:42px; border-radius:10px; border:1px solid var(--chrome-rule);
  background:transparent; color:var(--chrome-ink); font-size:20px; cursor:pointer; }
.stepper button:active{ opacity:.6; }
.stepper .val{ flex:1; text-align:center; font-size:14px; font-variant-numeric:tabular-nums; }
.swatches{ display:flex; gap:12px; }
.swatch{ width:46px; height:46px; border-radius:10px; cursor:pointer; position:relative;
  border:1px solid var(--chrome-rule); display:flex; align-items:center; justify-content:center;
  font-size:12px; }
.swatch.on{ box-shadow:0 0 0 2px var(--accent); border-color:var(--accent); }
.sw-paper{ background:#faf6ec; color:#2c2823; }
.sw-sepia{ background:#ecdcbd; color:#43381f; }
.sw-gray{ background:#26262b; color:#c9c6c0; }
.sw-black{ background:#0c0c0d; color:#b6b4af; }

/* 안내 토스트 (처음 진입) */
.hint{ position:fixed; left:50%; bottom:calc(70px + env(safe-area-inset-bottom));
  transform:translateX(-50%); z-index:55; background:rgba(0,0,0,.86); color:#fff;
  font-size:13px; padding:10px 16px; border-radius:999px; pointer-events:none;
  opacity:0; transition:opacity .3s ease; white-space:nowrap; }
.hint.show{ opacity:1; }

@media (max-width:520px){
  .prog-track,.prog-meta{ width:84%; }
  .topbar .doc-title{ font-size:13.5px; }
}
@media print{ .chrome,.tap-zones,.scrim,.sheet,.hint{ display:none !important; } }
</style>
</head>

<script type="text/markdown" id="book-md">
# md2ebook 사용 가이드

마크다운으로 써 둔 글 한 편이면 충분해요. 이 가이드는 **그 글을 어디서나 펼쳐 읽는 한 권의 책으로 바꾸는 방법**을 처음부터 끝까지 담았어요.

`[참고]` 차근차근 읽으셔도 좋고, 목차에서 끌리는 곳부터 펼쳐 보셔도 좋아요.

> 잘 쓴 글이 안 읽히는 건 대개 형식 탓이에요. 내용은 그대로 두고, 읽히는 모양만 바꿔 봅니다.

## 무엇을 위한 도구인가

md2ebook은 평범한 `.md` 파일을 **외부 의존성이 하나도 없는 오프라인 단일 HTML 책 리더(reader)**로 바꿔 줘요. CDN도, 웹폰트도, 자바스크립트 라이브러리도 끌어오지 않아요.

결과물은 파일 딱 하나라서, 메신저로 보내든 USB에 담든 받는 쪽은 더블클릭 한 번이면 바로 책을 펼쳐요. 네트워크가 끊긴 비행기에서도, 외부 접속이 막힌 폐쇄망에서도 똑같이 열려요.

글과 디자인이 분리돼 있다는 점이 핵심이에요. 다음 글을 낼 때도 마크다운 본문만 갈아 끼우면 같은 톤의 책이 다시 나와요. 한 번 마음에 든 모양을 계속 재사용하는 셈이죠.

`[팁]` 사내 공유 문서, 짧은 전자책, 발표 전 미리 읽히고 싶은 자료처럼 "한 사람이 차분히 끝까지 읽었으면" 하는 글에 잘 맞아요.

## 설치하기

`npx skills`를 쓰는 에이전트라면 어디서든 한 줄로 끝나요. Claude Code, Codex, Gemini CLI 모두 같은 명령을 써요.

```
npx skills add pollux-o4/md2ebook
```

설치한 다음에는 에이전트에게 `/md2ebook`이라고 부르고 변환할 `.md` 파일을 건네면 돼요. 나머지는 알아서 책 리더 HTML로 만들어 줘요.

### 이렇게 부르면 돼요

격식 차린 명령이 아니라, 평소 말하듯 자연어로 부르면 돼요. 폴더를 통째로 넘겨도 되고, 그 안의 특정 문서 하나만 짚어도 돼요.

> `/md2ebook 으로 my_skills 폴더 안의 .md 문서들 html로 바꿔줘`

> `/md2ebook my_skills 폴더의 A문서 변환해줘`

앞쪽처럼 부르면 폴더 안 마크다운을 한꺼번에, 뒤쪽처럼 부르면 짚어 준 문서 하나만 책으로 만들어 줘요.

`[참고]` 자세한 옵션과 구성은 [README](../README.html)에 정리돼 있어요. 소개가 궁금하시면 [소개 페이지](../intro.html)부터 둘러보셔도 좋아요.

## 글을 책으로 바꾸기

에이전트를 거치지 않고 직접 변환할 수도 있어요. 파이썬이 깔려 있다면 명령 한 줄이면 충분해요.

```
python build.py 내문서.md 내문서.html
```

### 파이썬이 없을 때

파이썬이 없어도 길은 있어요. `reader.html`을 복사한 뒤, 그 안의 마크다운 블록 내용만 내 글로 갈아 끼우면 돼요. 어느 쪽으로 만들든 결과물은 똑같아요.

### 시작 전 점검

막히지 않고 한 번에 끝내려면 아래만 미리 챙겨 두세요.

- [x] 변환할 `.md` 파일을 한 폴더에 두기
- [x] 제목 구조를 H1 한 개 + H2 여러 개로 잡아 두기
- [ ] 근거가 필요한 문장에 라벨 칩 달아 두기
- [ ] 표지 느낌을 줄 첫 문단 다듬기

`[중요]` 챕터는 H2를 기준으로 나뉘어요. 글을 여러 꼭지로 보여주고 싶다면 그 경계마다 H2를 두세요. 한 챕터가 화면 높이를 넘으면 리더가 알아서 다음 장으로 나눠 줘요.

## 책처럼 넘겨 읽기

리더를 열면 글이 화면 단위로 페이지네이션돼요. 마음에 드는 방식으로 장을 넘기면 되는데, 네 가지 넘김이 준비돼 있어요.

| 넘김 방식 | 느낌 |
|---|---|
| 3D 넘김 | 종이책을 넘기는 듯한 입체감 |
| 슬라이드 | 옆으로 밀려나는 깔끔한 전환 |
| 페이드 | 부드럽게 사라지고 떠오르는 전환 |
| 스크롤 | 페이지 구분 없이 위아래로 |

긴 글에서 길을 잃지 않도록 현재 위치를 짚어 주는 목차 드로어와 진행바가 늘 함께해요. 글에만 집중하고 싶을 땐 몰입모드로 군더더기를 걷어 내세요.

## 눈에 맞게 꾸미기

읽는 사람마다 편한 화면이 달라요. 그래서 리더 안에서 바로 바꿀 수 있게 해 두었어요.

### 설정 여는 법

화면 우상단의 `Aa` 버튼을 탭하면 설정 패널이 열려요. 테마, 글자 크기, 줄 간격, 서체를 모두 여기서 바로 바꿔요.

### 테마와 글자

테마는 paper, sepia, gray, black 네 가지예요. 밝은 곳에서는 paper나 sepia, 어두운 곳에서는 black이 눈에 편해요. 여기에 글자 크기와 줄 간격을 조절하고, 본문 서체를 고딕과 명조 사이에서 고를 수 있어요.

### 멈춘 자리 이어 읽기

읽던 위치와 이 설정들, 그리고 체크박스 상태까지 localStorage에 저장돼요. 창을 닫았다 다시 열어도 멈췄던 그 자리, 그 화면 그대로 이어 읽어요.

## 추가로 이런 것도 — 색 라벨 칩

여기서부터는 있으면 좋은 부가기능이에요. 먼저 색 라벨 칩부터 볼게요.

백틱으로 감싼 대괄호 단어가 색칩이 돼요. 예를 들어 이렇게 적으면

```
`[중요]`   `[디자인]`   `[리뷰]`
```

리더에서는 `[중요]` `[디자인]` `[리뷰]` 처럼 또렷한 색칩으로 떠요. 대괄호만 쓰면 안 되고, 그 바깥을 백틱으로 한 번 더 감싸야 한다는 것만 기억하면 돼요.

아무 단어나 칩이 되고, 같은 단어는 어느 문서에서나 같은 색이라 여러 글에 걸쳐 일관되게 보여요. 색이 마음에 안 들면 리더 안에서 직접 바꿀 수도 있어요. `[중요]` `[TODO]` `[참고]` 처럼 자주 쓰는 말은 색이 미리 정해져 있고요.

## 그 밖의 읽기 편의 기능

본문 안의 요소도 리더에서 조금씩 더 편하게 다룰 수 있어요.

### 코드블록 복사 버튼

코드블록에는 복사 버튼이 붙어요. 길게 드래그할 필요 없이, 오른쪽 위 버튼을 한 번 눌러 통째로 복사해요. 아래 블록에서 바로 해 보세요.

```
python build.py guide.md guide.html
```

### 체크박스 토글

체크박스가 있는 목록은 눌러서 토글할 수 있고, 그 상태가 그대로 저장돼요. 아래 항목을 직접 체크해 보세요.

- [x] 변환할 글 고르기
- [ ] 넘김과 테마 맞추기
- [ ] 완성한 책 공유하기

## 이제 펼쳐 볼 차례

여기까지 읽으셨다면 흐름은 다 잡힌 거예요. 설치하고, 글 한 편을 변환하고, 마음에 드는 넘김과 테마로 맞춘 다음, 책을 그대로 누군가에게 건네면 돼요.

처음 한 권은 짧은 글로 가볍게 만들어 보시길 권해요. 손에 익으면 그다음부터는 본문만 바꿔 끼우는 일이라, 두 번째 책은 첫 책보다 훨씬 빨리 나와요. 마크다운으로 쓴 글이 그대로 한 권의 책이 되는 경험, 직접 한 번 해 보세요.

const HUES = {
  '중요':6,'IMPORTANT':6, 'TODO':214,'할일':214, '질문':278,'QUESTION':278,
  '참고':158,'NOTE':158,'REF':158, '경고':32,'WARNING':32, '팁':176,'TIP':176,
};
// 예약 hue 없으면 단어 해시 → 0~359 (같은 단어는 항상 같은 색)
function hue(s){
  if (HUES[s] != null) return HUES[s];
  let h=0; for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))>>>0; return h%360;
}
const usedLabels = new Set();   // 문서에 쓰인 커스텀(비시맨틱) 라벨 — 설정에서 색 조절용
let taskIdx = 0;                 // 체크박스 안정 인덱스 (parseMarkdown 시작 시 0으로 리셋)
function attr(s){ return esc(s).replace(/"/g,'&quot;'); }

// 널바이트 자리표시자 단일 소스 — 코드/이미지를 esc 전에 빼두고 마지막에 되꽂는다.
const NUL = String.fromCharCode(0);
const PH = n => NUL + n + NUL;
const RE_PH = new RegExp(NUL + '(\\d+)' + NUL, 'g');
// 인라인 정규식 호이스팅(모듈 스코프) — 매 호출 재컴파일 회피.
const RE_CODE = /`([^`]+)`/g;
const RE_LABEL = /^\[(.+)\]$/;
const RE_IMG = /!\[([^\]]*)\]\(([^)\s]+)(?:\s+"([^"]*)")?\)/g;
const RE_BOLD = /\*\*([^*]+)\*\*/g;
const RE_ITAL = /(^|[^*])\*([^*\n]+)\*/g;
const RE_DEL = /~~([^~]+)~~/g;
const RE_LINK = /(^|[^!])\[([^\]]+)\]\(([^)\s]+)(?:\s+"([^"]*)")?\)/g;
const RE_EXT = /^(https?:|mailto:|\/\/)/i;

// 라벨 칩 렌더 — 시맨틱 고정색이면 매핑 클래스, 아니면 .lbl.auto + data-key(usedLabels 등록).
function renderLabel(key, raw){ if (LABELS[key]) return '<span class="lbl '+LABELS[key]+'">'+esc(raw)+'</span>'; usedLabels.add(key); return '<span class="lbl auto" data-key="'+attr(key)+'">'+esc(raw)+'</span>'; }

function inline(text){
  // 코드 먼저 추출(내부는 이스케이프, 인라인 처리 안 함) → 자리표시자
  const codes = [];
  text = text.replace(RE_CODE, (m, c) => {
    const t = c.trim();
    const lm = RE_LABEL.exec(t);              // [사실] 같은 라벨에서 대괄호 제거
    const html = lm ? renderLabel(lm[1], t) : '<code>'+esc(c)+'</code>';
    codes.push(html); return PH(codes.length-1);
  });
  // 이미지 ![대체텍스트](src "제목") — src 보존 위해 esc 전에 자리표시자로 추출.
  text = text.replace(RE_IMG, (m, alt, src, title) => {
    const tt = title ? ' title="'+attr(title)+'"' : '';
    codes.push('<img src="'+src+'" alt="'+attr(alt)+'"'+tt+'>');
    return PH(codes.length-1);
  });
  text = esc(text);
  text = text.replace(RE_BOLD, '<strong>$1</strong>');
  text = text.replace(RE_ITAL, '$1<em>$2</em>');
  text = text.replace(RE_DEL, '<del>$1</del>');
  // 링크 [텍스트](url "제목") — 이미지(! 앞)는 제외. 외부 http 는 새 탭, 로컬은 같은 탭.
  text = text.replace(RE_LINK, (m, pre, txt, href, title) => {
    const ext = RE_EXT.test(href);
    const tgt = ext ? ' target="_blank" rel="noopener noreferrer"' : '';
    const tt = title ? ' title="'+attr(title)+'"' : '';
    return pre + '<a href="'+href.replace(/"/g,'&quot;')+'"'+tgt+tt+'>'+txt+'</a>';
  });
  text = text.replace(RE_PH, (m, i) => codes[+i]);
  return text;
}

function slug(s){
  return s.toLowerCase().replace(/<[^>]+>/g,'').replace(/[^\w\uac00-\ud7a3\s-]/g,'')
    .trim().replace(/\s+/g,'-').slice(0,60) || 'h';
}

// 목록 렌더 — 들여쓰기로 중첩, 줄당 한 항목, 체크박스 지원
function renderList(items){
  let out = ''; const stack = [];   // stack: [{indent, ordered}]
  const closeTo = n => { while (stack.length > n){ const t = stack.pop();
    out += '</li>' + (t.ordered ? '</ol>' : '</ul>'); } };
  items.forEach(it => {
    while (stack.length && it.indent < stack[stack.length-1].indent) closeTo(stack.length-1);
    const top = stack[stack.length-1];
    if (top && it.indent <= top.indent){ out += '</li>'; }
    else { stack.push({ indent: it.indent, ordered: it.ordered });
           out += it.ordered ? '<ol>' : '<ul>'; }
    const cb = /^\[([ xX])\]\s+([\s\S]*)$/.exec(it.text);
    if (cb){ const ck = cb[1].toLowerCase()==='x' ? ' checked' : '';
      out += '<li class="task"><input type="checkbox" data-task-idx="'+(taskIdx++)+'"'+ck+'> '+inline(cb[2]); }
    else { out += '<li>'+inline(it.text); }
  });
  closeTo(0);
  return out;
}

function parseMarkdown(md){
  const lines = md.replace(/\r/g,'').split('\n');
  let html = '', i = 0; const usedIds = {};
  taskIdx = 0;   // 체크박스 인덱스 리셋 — 같은 문서면 항상 동일한 idx 배정
  const mkId = base => { let id = base, n = 2; while(usedIds[id]){ id = base+'-'+n++; } usedIds[id]=1; return id; };

  while (i < lines.length){
    let line = lines[i];

    // 코드펜스
    if (/^```/.test(line)){
      let buf = []; i++;
      while (i < lines.length && !/^```/.test(lines[i])){ buf.push(lines[i]); i++; }
      i++; html += '<div class="codeblock"><button class="copy-btn" type="button">복사</button>'
        + '<pre><code>'+esc(buf.join('\n'))+'</code></pre></div>'; continue;
    }
    // 헤딩
    let h = /^(#{1,6})\s+(.*)$/.exec(line);
    if (h){
      const lv = h[1].length, txt = inline(h[2].trim());
      const id = mkId(slug(h[2]));
      html += '<h'+lv+' id="'+id+'" data-h="'+lv+'">'+txt+'</h'+lv+'>';
      i++; continue;
    }
    // 수평선
    if (/^---+\s*$/.test(line)){ html += '<hr/>'; i++; continue; }
    // 인용(연속 라인)
    if (/^>\s?/.test(line)){
      let buf = [];
      while (i < lines.length && /^>\s?/.test(lines[i])){ buf.push(lines[i].replace(/^>\s?/,'')); i++; }
      html += '<blockquote>'+buf.map(b=> b.trim()? '<p>'+inline(b)+'</p>':'').join('')+'</blockquote>';
      continue;
    }
    // 표
    if (/^\|.*\|/.test(line) && i+1 < lines.length && /^\|?[\s:|-]+\|?\s*$/.test(lines[i+1]) && lines[i+1].includes('-')){
      const splitRow = r => r.replace(/^\||\|$/g,'').split('|').map(c=>c.trim());
      const head = splitRow(line); i += 2;
      let body = '';
      while (i < lines.length && /^\|.*\|/.test(lines[i])){
        const cells = splitRow(lines[i]);
        body += '<tr>'+cells.map(c=>'<td>'+inline(c)+'</td>').join('')+'</tr>'; i++;
      }
      html += '<div class="table-wrap"><table><thead><tr>'
        + head.map(c=>'<th>'+inline(c)+'</th>').join('')
        + '</tr></thead><tbody>'+body+'</tbody></table></div>';
      continue;
    }
    // 목록 (순서/비순서 · 중첩 · 체크박스)
    const liRe = /^(\s*)([-*]|\d+\.)\s+(.*)$/;
    if (liRe.test(line)){
      const items = [];
      while (i < lines.length){
        const m = liRe.exec(lines[i]);
        if (!m) break;
        items.push({ indent: m[1].replace(/\t/g,'    ').length,
                     ordered: /\d/.test(m[2]), text: m[3] });
        i++;
      }
      html += renderList(items); continue;
    }
    // 빈 줄
    if (/^\s*$/.test(line)){ i++; continue; }
    // 단락(연속 비빈 줄 묶기)
    let buf = [];
    while (i < lines.length && !/^\s*$/.test(lines[i]) && !/^(#{1,6}\s|>|```|\||\s*[-*]\s|\s*\d+\.\s|---)/.test(lines[i])){
      buf.push(lines[i]); i++;
    }
    if (buf.length) html += '<p>'+inline(buf.join(' '))+'</p>';
  }
  return html;
}

/* =========================================================================
   2) 상태 + 영속화
   ========================================================================= */
const $ = s => document.querySelector(s);
const reader = $('#reader');
const DEFAULTS = { theme:'paper', flip:'flip3d', size:18, lead:1.9, font:'sans' };
let settings = Object.assign({}, DEFAULTS, load('br-settings', {}));
if (!settings.labelHues || typeof settings.labelHues !== 'object') settings.labelHues = {};
const STORE_POS = 'br-pos';

function load(k, d){ try{ return JSON.parse(localStorage.getItem(k)) ?? d; }catch(e){ return d; } }
function save(k, v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }

/* =========================================================================
   3) 페이지네이션 (H2 = 새 챕터, 높이 초과 시 자동 분할)
   ========================================================================= */
// build.py 주입 시 닫는 스크립트 태그를 이스케이프하므로 파싱 전 원복(코드 예시 정확성)
const rawMd = $('#book-md').textContent.replace(/<\\\/script>/g, '<\/script>');
const sourceHtml = parseMarkdown(rawMd);
const srcDoc = document.createElement('div');
srcDoc.innerHTML = sourceHtml;
const srcNodes = Array.from(srcDoc.children);

// 문서 제목
const h1 = srcDoc.querySelector('h1');
const docTitle = h1 ? h1.textContent : '책';
const docKey = p => p + ':' + docTitle;
$('#docTitle').textContent = docTitle;
document.title = docTitle + ' · 책 리더';

/* 체크박스 상태: data-task-idx -> bool, 문서별 localStorage 영속화.
   마크다운의 [x] 가 기본값, 저장된 값이 있으면 그것이 우선. */
const STORE_TASKS = docKey('br-tasks');
let taskState = load(STORE_TASKS, {});
if (!taskState || typeof taskState !== 'object') taskState = {};
// 마운트된 패드의 체크박스에 저장된 상태를 재적용 (windowed mounting 대비 — 매 마운트마다 호출)
function applyTasks(pad){
  pad.querySelectorAll('input[type=checkbox][data-task-idx]').forEach(cb => {
    const saved = taskState[cb.dataset.taskIdx];
    if (saved !== undefined) cb.checked = !!saved;
  });
}

let pages = [];        // {html, headings:[{id,level,text}]}
const headingPage = {}; // id -> page index
let current = 0;
let tocItems = [];      // 캐시된 .toc-item 버튼들 (buildToc 에서 채움) — 크롬 갱신 시 querySelectorAll 회피
// 스크롤 모드 활성 헤딩 추적 (IntersectionObserver)
let scrollObserver = null;     // 현재 IO 인스턴스 (스크롤 모드에서만 살아있음)
let scrollHeadings = [];       // 관측 중인 헤딩 노드 (DOM 순서)
const scrollAboveTop = new Set(); // 상단 경계선 위로 지난 헤딩 id 집합 (IO 콜백이 갱신)
let scrollActiveId = null;     // 현재 활성 헤딩 id (목차 강조용)
let scrollChap = '';           // 현재 챕터 = 경계선 위 마지막 H1/H2 텍스트

function paginate(){
  const pad = $('#padMeasure');
  const maxH = pad.clientHeight;
  pages = []; for (const k in headingPage) delete headingPage[k];
  let curNodes = [];
  const flush = () => {
    if (!curNodes.length) return;
    const headings = curNodes.filter(n=>/^H[1-3]$/.test(n.tagName))
      .map(n=>({ id:n.id, level:+n.dataset.h, text:n.textContent }));
    pages.push({ html: curNodes.map(n=>n.outerHTML).join(''), headings });
    curNodes = [];
  };
  pad.textContent = '';
  for (const node of srcNodes){
    const isBreak = node.tagName === 'H1' || node.tagName === 'H2';
    if (isBreak && curNodes.length){ flush(); pad.textContent = ''; }
    curNodes.push(node);
    pad.appendChild(node.cloneNode(true));
    if (pad.scrollHeight > maxH && curNodes.length > 1){
      curNodes.pop();
      pad.removeChild(pad.lastChild);
      flush();
      pad.textContent = '';
      curNodes.push(node);
      pad.appendChild(node.cloneNode(true));
    }
  }
  flush();
  pages.forEach((p, idx) => p.headings.forEach(h => { if (headingPage[h.id] === undefined) headingPage[h.id] = idx; }));
}

/* =========================================================================
   4) 렌더 + 네비게이션 + 넘김 효과
   ========================================================================= */
const padBelow = $('#padBelow'), padAnim = $('#padAnim');
const animLayer = $('#animLayer'), animShade = $('#animShade');
const stage = $('#stage');
let animating = false;

function setHtml(pad, idx){ pad.innerHTML = (pages[idx] && pages[idx].html) || ''; pad.scrollTop = 0; applyTasks(pad); }

function renderBase(){
  if (settings.flip === 'scroll'){ padBelow.innerHTML = sourceHtml; applyTasks(padBelow); observeScrollHeadings(); }
  else { setHtml(padBelow, current); disconnectScrollObserver(); }
}

// 스크롤 모드: padBelow 의 H1~H3 을 IntersectionObserver 로 관측해 활성 헤딩을 추적.
// rootMargin 의 top -80px 로 "상단에서 80px 지난" 헤딩이 활성 후보가 되게 한다(기존 offsetTop<=80 과 동일 경계).
function observeScrollHeadings(){
  disconnectScrollObserver();
  scrollHeadings = Array.from(padBelow.querySelectorAll('h1,h2,h3'));
  if (!scrollHeadings.length) return;
  scrollObserver = new IntersectionObserver(entries => {
    entries.forEach(e => {
      const rb = e.rootBounds;
      // 헤딩 상단이 (조정된) 루트 상단선 위로 올라가면 "지난" 것으로 본다.
      const above = rb ? (e.boundingClientRect.top <= rb.top) : false;
      if (above) scrollAboveTop.add(e.target.id); else scrollAboveTop.delete(e.target.id);
    });
    updateChromeScroll();
  }, { root: stage, rootMargin: '-80px 0px 0px 0px', threshold: 0 });
  scrollHeadings.forEach(h => scrollObserver.observe(h));
}
function disconnectScrollObserver(){
  if (scrollObserver){ scrollObserver.disconnect(); scrollObserver = null; }
  scrollHeadings = []; scrollAboveTop.clear();
}

// 진행바·페이지수만 즉시 칠한다(넘김 시작 시 호출 → 게이지가 클릭에 바로 반응).
function paintProgress(idx){
  const total = pages.length;
  $('#metaPage').textContent = (idx+1) + ' / ' + total;
  $('#progFill').style.width = total>1 ? (idx/(total-1)*100)+'%' : '100%';
}

function updateChrome(){
  if (settings.flip === 'scroll'){ updateChromeScroll(); return; }
  paintProgress(current);
  // 현재 챕터(가장 가까운 H1/H2)
  let chap = '';
  for (let i = current; i >= 0; i--){
    const hs = pages[i].headings.filter(h=>h.level<=2);
    if (hs.length){ chap = hs[hs.length-1].text; break; }
  }
  $('#metaChap').textContent = chap;
  // 목차 활성
  tocItems.forEach(el=>{
    el.classList.toggle('active', headingPage[el.dataset.id] === current);
  });
  save(docKey(STORE_POS), current);
}

function updateChromeScroll(){
  const max = stage.scrollHeight - stage.clientHeight;
  const ratio = max > 0 ? stage.scrollTop / max : 0;
  $('#progFill').style.width = (ratio*100)+'%';
  $('#metaPage').textContent = Math.round(ratio*100) + '%';
  // 화면 상단을 지난 마지막 헤딩 = 현재 챕터 + 목차 활성 (IntersectionObserver 가 채운 집합에서 도출)
  scrollChap = ''; scrollActiveId = null;
  scrollHeadings.forEach(h => { if (scrollAboveTop.has(h.id)){ if(+h.dataset.h<=2) scrollChap = h.textContent; scrollActiveId = h.id; } });
  $('#metaChap').textContent = scrollChap;
  tocItems.forEach(el=> el.classList.toggle('active', el.dataset.id === scrollActiveId));
}

function clamp(n){ return Math.max(0, Math.min(pages.length-1, n)); }

// rAF 트윈 (백그라운드에서 rAF가 멈춰도 잠금이 풀리도록 워치독 포함)
function tween(from, to, dur, step, done){
  const t0 = performance.now();
  const ease = p => 1 - Math.pow(1-p, 3);
  let finished = false, wd;
  const finish = () => { if (finished) return; finished = true; clearTimeout(wd); step(to); if (done) done(); };
  function frame(t){
    if (finished) return;
    let p = Math.min(1, (t-t0)/dur);
    step(from + (to-from)*ease(p));
    if (p < 1) requestAnimationFrame(frame); else finish();
  }
  requestAnimationFrame(frame);
  wd = setTimeout(finish, dur + 300);
}

function endTurn(){ animLayer.style.display='none'; animLayer.style.transform=''; animLayer.style.opacity=1; animShade.style.opacity=0; animating=false; }

// 넘김 진행 적용: prog 0~1, dir 'next'|'prev'
function applyTurn(prog, dir, mode){
  if (mode === 'fade'){
    if (dir === 'next'){ animLayer.style.opacity = (1-prog); }
    else { animLayer.style.opacity = prog; }
    animLayer.style.transform = '';
  } else if (mode === 'slide'){
    animLayer.style.opacity = 1;
    if (dir === 'next'){ animLayer.style.transform = 'translateX('+(-prog*100)+'%)'; }
    else { animLayer.style.transform = 'translateX('+((prog-1)*100)+'%)'; }
  } else { // flip3d
    animLayer.style.opacity = 1;
    const ang = dir === 'next' ? -90*prog : -90*(1-prog);
    animLayer.style.transform = 'rotateY('+ang+'deg)';
    animShade.style.opacity = dir === 'next' ? prog : (1-prog);
  }
}

function prepareTurn(dir, mode){
  animLayer.classList.toggle('flipping', mode === 'flip3d');
  animShade.style.opacity = 0;
  if (dir === 'next'){
    setHtml(padAnim, current);          // 떠나는 현재 페이지가 위
    setHtml(padBelow, current+1);       // 다음 페이지가 아래에서 드러남
  } else {
    setHtml(padAnim, current-1);        // 들어오는 이전 페이지가 위
    setHtml(padBelow, current);         // 현재가 아래
  }
  animLayer.style.display = 'flex';
  applyTurn(0, dir, mode);
}

function go(dir){
  if (animating) return;
  const target = dir === 'next' ? current+1 : current-1;
  if (target < 0 || target >= pages.length){ bounce(dir); return; }
  const mode = settings.flip;
  if (mode === 'scroll'){ current = target; renderBase(); updateChrome(); return; }
  animating = true;
  paintProgress(target);   // 게이지는 넘김 애니와 동시에 글라이드 → 클릭에 즉시 반응
  prepareTurn(dir, mode);
  tween(0, 1, 360, p => applyTurn(p, dir, mode), () => {
    current = target;
    renderBase();
    endTurn();
    updateChrome();
  });
}

function bounce(dir){
  const sign = dir === 'next' ? -1 : 1;
  const el = padBelow.parentElement.parentElement;
  tween(0, 1, 280, p => {
    const o = Math.sin(p*Math.PI) * 22 * sign;
    el.style.transform = 'translateX('+o+'px)';
  }, () => { el.style.transform = ''; });
}

/* ---- 콘텐츠 인터랙션 (코드 복사 / 이미지 줌 / 체크박스) ----
   page-pad 에 위임. 핸들러는 stopPropagation 으로 stage 의 페이지 넘김 클릭을 막는다. */

// 이미지 라이트박스: 재사용 오버레이 1개
let lightbox = null;
function ensureLightbox(){
  if (lightbox) return lightbox;
  lightbox = document.createElement('div');
  lightbox.className = 'lightbox';
  lightbox.innerHTML = '<img alt="">';
  lightbox.addEventListener('click', closeLightbox);
  document.body.appendChild(lightbox);
  return lightbox;
}
function openLightbox(src, alt){
  const lb = ensureLightbox();
  const img = lb.querySelector('img');
  img.src = src; img.alt = alt || '';
  lb.classList.add('show');
}
function closeLightbox(){ if (lightbox) lightbox.classList.remove('show'); }

// 코드 복사: pre 의 textContent 를 클립보드로. file:// 대비 execCommand 폴백.
function copyText(text, btn){
  const done = () => { const o = btn.textContent; btn.textContent = '복사됨';
    setTimeout(() => { btn.textContent = o; }, 1200); };
  const fallback = () => {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    try{ document.execCommand('copy'); done(); }catch(e){}
    document.body.removeChild(ta);
  };
  if (navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done, fallback);
  } else fallback();
}

function bindContent(pad){
  pad.addEventListener('click', e => {
    const btn = e.target.closest('.copy-btn');
    if (btn){
      e.stopPropagation(); e.preventDefault();
      const pre = btn.parentElement.querySelector('pre');
      if (pre) copyText(pre.textContent, btn);
      return;
    }
    const img = e.target.closest('img');
    if (img){ e.stopPropagation(); openLightbox(img.src, img.alt); return; }
    const cb = e.target.closest('input[type=checkbox][data-task-idx]');
    if (cb){ e.stopPropagation(); return; }   // 토글은 change 에서 처리, 넘김만 차단
  });
  pad.addEventListener('change', e => {
    const cb = e.target.closest('input[type=checkbox][data-task-idx]');
    if (!cb) return;
    e.stopPropagation();
    taskState[cb.dataset.taskIdx] = cb.checked;
    save(STORE_TASKS, taskState);
  });
}
bindContent(padBelow);
bindContent(padAnim);

window.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

/* ---- 드래그 / 스와이프 ---- */
let drag = null;
stage.addEventListener('pointerdown', e => {
  if (settings.flip === 'scroll' || animating) return;
  if (e.target.closest('.toc-item')) return;
  drag = { x:e.clientX, y:e.clientY, dir:null, active:false, w:stage.clientWidth, t:performance.now(), type:e.pointerType };
});
stage.addEventListener('pointermove', e => {
  if (!drag) return;
  const dx = e.clientX - drag.x, dy = e.clientY - drag.y;
  if (!drag.active){
    if (Math.abs(dx) < 8 || Math.abs(dx) < Math.abs(dy)) return;
    // 마우스는 드래그로 넘기지 않고 텍스트 선택을 허용 (데스크탑은 좌우 탭·키보드로 넘김)
    if (drag.type === 'mouse'){ drag = null; return; }
    drag.dir = dx < 0 ? 'next' : 'prev';
    const target = drag.dir === 'next' ? current+1 : current-1;
    if (target < 0 || target >= pages.length){ const d=drag.dir; drag = null; bounce(d); return; }
    drag.active = true;
    reader.classList.add('dragging');
    const sel = window.getSelection && window.getSelection(); if (sel) sel.removeAllRanges();
    prepareTurn(drag.dir, settings.flip);
    try{ stage.setPointerCapture(e.pointerId); }catch(_){}
  }
  let prog = drag.dir === 'next' ? (-dx/drag.w) : (dx/drag.w);
  prog = Math.max(0, Math.min(1, prog));
  drag.prog = prog;
  e.preventDefault();
  applyTurn(prog, drag.dir, settings.flip);
});
stage.addEventListener('pointerup', e => {
  if (!drag){ return; }
  if (!drag.active){ drag = null; return; }
  reader.classList.remove('dragging');
  lastSwipe = performance.now();
  const mode = settings.flip, dir = drag.dir;
  const dx = e.clientX - drag.x, dt = performance.now() - drag.t;
  const vel = Math.abs(dx)/dt; // px/ms
  const prog = drag.prog || 0;
  const commit = prog > 0.5 || vel > 0.5;
  animating = true;
  const d = drag; drag = null;
  if (commit){
    paintProgress(dir === 'next' ? current+1 : current-1);   // 게이지 즉시 반영
    tween(prog, 1, 240*(1-prog)+80, p => applyTurn(p, dir, mode), () => {
      current = dir === 'next' ? current+1 : current-1;
      renderBase(); endTurn();
      updateChrome();
    });
  } else {
    tween(prog, 0, 200, p => applyTurn(p, dir, mode), () => {
      endTurn();
    });
  }
});
stage.addEventListener('pointercancel', () => { drag = null; reader.classList.remove('dragging'); });

/* ---- 탭 영역 (오버레이는 통과시키고 stage 클릭 좌표로 판정 → 텍스트 선택 보존) ---- */
let lastSwipe = 0;
stage.addEventListener('click', e => {
  if (settings.flip === 'scroll') return;
  if (performance.now() - lastSwipe < 400) return;      // 방금 스와이프로 넘겼으면 무시
  if (e.target.closest('a')) return;                    // 링크 클릭은 통과
  const sel = window.getSelection && window.getSelection();
  if (sel && String(sel).trim()) return;                // 텍스트를 선택 중이면 넘기지 않음
  const x = e.clientX - stage.getBoundingClientRect().left;
  const w = stage.clientWidth;
  if (x < w * 0.30) go('prev');
  else if (x > w * 0.70) go('next');
  else reader.classList.toggle('immersive');
});

/* ---- 키보드 ---- */
window.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ') { e.preventDefault(); go('next'); }
  else if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); go('prev'); }
  else if (e.key === 'Escape') closeSheets();
});

/* =========================================================================
   5) 목차
   ========================================================================= */
function buildToc(){
  const list = $('#tocList'); list.innerHTML = ''; tocItems = [];
  srcNodes.filter(n=>/^H[1-3]$/.test(n.tagName)).forEach(n => {
    const lv = +n.dataset.h;
    const b = document.createElement('button');
    b.className = 'toc-item lv'+lv; b.dataset.id = n.id;
    b.innerHTML = '<span>'+n.innerHTML+'</span><span class="pg">'+((headingPage[n.id]??0)+1)+'</span>';
    b.addEventListener('click', () => { jumpTo(n.id); closeSheets(); });
    list.appendChild(b);
    tocItems.push(b);
  });
}
function jumpTo(id){
  if (settings.flip === 'scroll'){
    const el = padBelow.querySelector('#'+CSS.escape(id));
    if (el) stage.scrollTop = el.offsetTop - 64;
    updateChrome();
    return;
  }
  const idx = headingPage[id];
  if (idx === undefined) return;
  current = clamp(idx);
  renderBase(); updateChrome();
}

/* =========================================================================
   6) 설정 적용
   ========================================================================= */
function applySettings(){
  document.documentElement.dataset.theme = settings.theme;
  document.documentElement.style.setProperty('--reader-size', settings.size+'px');
  document.documentElement.style.setProperty('--reader-leading', settings.lead);
  document.documentElement.style.setProperty('--reader-font', settings.font==='serif'?'var(--font-serif)':'var(--font-sans)');
  reader.classList.toggle('scrollmode', settings.flip === 'scroll');
  // UI 상태 반영
  document.querySelectorAll('#setTheme .swatch').forEach(s=>s.classList.toggle('on', s.dataset.theme===settings.theme));
  document.querySelectorAll('#setFlip button').forEach(s=>s.classList.toggle('on', s.dataset.flip===settings.flip));
  document.querySelectorAll('#setLead button').forEach(s=>s.classList.toggle('on', +s.dataset.lead===settings.lead));
  document.querySelectorAll('#setFont button').forEach(s=>s.classList.toggle('on', s.dataset.font===settings.font));
  $('#sizeVal').textContent = settings.size+'px';
  save('br-settings', settings);
}

// 라벨별 hue 를 스타일시트로 주입 (오버라이드 없으면 기본 hue). 칩·미리보기에 동시 적용.
function labelHue(k){ return settings.labelHues[k] != null ? settings.labelHues[k] : hue(k); }
function applyLabelStyle(){
  let css = '';
  usedLabels.forEach(k => {
    const sel = '.lbl.auto[data-key="' + k.replace(/["\\]/g,'\\$&') + '"]';
    css += sel + '{--h:' + labelHue(k) + '}';
  });
  let el = document.getElementById('labelStyle');
  if (!el){ el = document.createElement('style'); el.id = 'labelStyle'; document.head.appendChild(el); }
  el.textContent = css;
}

// 설정 패널의 "라벨 색": 문서에 쓰인 라벨을 색칩 그리드로. 칩 탭 → 그 칩만 편집.
let editKey = null;
function buildLabelControls(){
  const wrap = $('#setLabels'); if (!wrap) return;
  const keys = [...usedLabels].sort();
  $('#setLabelRow').hidden = keys.length === 0;
  $('#setLabelCount').textContent = keys.length ? '('+keys.length+')' : '';
  wrap.innerHTML = keys.map(k =>
    '<span class="lbl auto" data-key="'+attr(k)+'" role="button" tabindex="0">'+esc(k)+'</span>'
  ).join('');
  closeLabelEditor();
}
function openLabelEditor(k){
  editKey = k;
  const chip = $('#labEditChip'); chip.dataset.key = k; chip.textContent = k;
  $('#labEditRange').value = labelHue(k);
  $('#labelEditor').hidden = false;
  applyLabelStyle();   // 편집용 칩(같은 data-key)도 색 반영
  document.querySelectorAll('#setLabels .lbl').forEach(c => c.classList.toggle('sel', c.dataset.key === k));
}
function closeLabelEditor(){
  editKey = null;
  const e = $('#labelEditor'); if (e) e.hidden = true;
  document.querySelectorAll('#setLabels .lbl.sel').forEach(c => c.classList.remove('sel'));
}

function reflow(keepId){
  // 재배치 전 기준 heading 기억
  let anchor = keepId;
  if (!anchor && pages[current]) anchor = (pages[current].headings[0]||{}).id;
  paginate();
  if (anchor && headingPage[anchor] !== undefined) current = headingPage[anchor];
  current = clamp(current);
  renderBase();
  buildToc();
  updateChrome();
}

// 스크롤 모드 진행 갱신
stage.addEventListener('scroll', () => { if (settings.flip === 'scroll') updateChromeScroll(); }, { passive:true });

/* 설정 이벤트 */
$('#setTheme').addEventListener('click', e => { const t=e.target.closest('.swatch'); if(!t)return; settings.theme=t.dataset.theme; applySettings(); });
$('#setFlip').addEventListener('click', e => { const b=e.target.closest('button'); if(!b)return; settings.flip=b.dataset.flip; applySettings(); reflow(); });
$('#setLead').addEventListener('click', e => { const b=e.target.closest('button'); if(!b)return; settings.lead=+b.dataset.lead; applySettings(); reflow(); });
$('#setFont').addEventListener('click', e => { const b=e.target.closest('button'); if(!b)return; settings.font=b.dataset.font; applySettings(); reflow(); });
$('#sizeUp').addEventListener('click', () => { settings.size=Math.min(28,settings.size+1); applySettings(); reflow(); });
$('#sizeDown').addEventListener('click', () => { settings.size=Math.max(14,settings.size-1); applySettings(); reflow(); });
// 라벨 색: 칩 탭 → 편집 토글, 슬라이더로 hue 조정(라이브), 리셋으로 자동 색 복귀
$('#setLabels').addEventListener('click', e => {
  const c = e.target.closest('.lbl'); if(!c) return;
  (editKey === c.dataset.key) ? closeLabelEditor() : openLabelEditor(c.dataset.key);
});
$('#setLabels').addEventListener('keydown', e => {
  if (e.key !== 'Enter' && e.key !== ' ') return;
  const c = e.target.closest('.lbl'); if(!c) return; e.preventDefault();
  openLabelEditor(c.dataset.key);
});
$('#labEditRange').addEventListener('input', e => {
  if (editKey == null) return;
  settings.labelHues[editKey] = +e.target.value; applyLabelStyle(); save('br-settings', settings);
});
$('#labEditReset').addEventListener('click', () => {
  if (editKey == null) return;
  delete settings.labelHues[editKey];
  $('#labEditRange').value = labelHue(editKey); applyLabelStyle(); save('br-settings', settings);
});

/* =========================================================================
   7) 오버레이 열고 닫기
   ========================================================================= */
const scrim = $('#scrim');
function openSheet(el){ scrim.classList.add('show'); el.classList.add('show'); el.setAttribute('aria-hidden','false'); }
function closeSheets(){ scrim.classList.remove('show'); $('#tocSheet').classList.remove('show'); $('#setSheet').classList.remove('show'); }
$('#btnToc').addEventListener('click', ()=>openSheet($('#tocSheet')));
$('#btnSettings').addEventListener('click', ()=>openSheet($('#setSheet')));
$('#tocClose').addEventListener('click', closeSheets);
$('#setClose').addEventListener('click', closeSheets);
scrim.addEventListener('click', closeSheets);

/* =========================================================================
   8) 부팅
   ========================================================================= */
function boot(){
  applySettings();
  applyLabelStyle();
  buildLabelControls();
  paginate();
  buildToc();
  current = clamp(load(docKey(STORE_POS), 0));
  renderBase();
  updateChrome();
  // 첫 진입 힌트
  if (!load('br-hinted', false)){
    const hint = $('#hint'); hint.classList.add('show');
    setTimeout(()=>hint.classList.remove('show'), 3200);
    save('br-hinted', true);
  }
}
boot();

// 리사이즈 시 재배치(디바운스)
let rt; window.addEventListener('resize', () => { clearTimeout(rt); rt = setTimeout(()=>reflow(), 200); });
</script>
